name: Release

on:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop
        run: pnpm --filter @adt/desktop build

      - name: Publish MacOS
        if: matrix.os == 'macos-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          # CSC_LINK — the base64-encoded .p12 content
          # CSC_KEY_PASSWORD — the certificate password
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish Windows
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --win --publish always
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Linux
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: version
        run: |
          REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/unicef/adt-studio:latest
            ghcr.io/unicef/adt-studio:${{ steps.version.outputs.tag }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$TAG" --repo ${{ github.repository }} --title "ADT Studio $TAG" --notes ""

      - name: Generate standalone docker-compose.yml
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          sed "s/__TAG__/${TAG}/g" docker/compose-release.yml.template > docker-compose.yml

      - name: Upload docker-compose.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.version.outputs.tag }} docker-compose.yml \
            --repo ${{ github.repository }} \
            --clobber

      - name: Upload launcher scripts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.version.outputs.tag }} scripts/windows-setup-and-run.bat \
            --repo ${{ github.repository }} \
            --clobber

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq '.body')
          gh release edit "$TAG" --notes "$NOTES"
