name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.8.0)'
        required: true

jobs:
  prepare:
    # Only run on RELEASE: <tag> commits or on a manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'RELEASE:') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            MSG=$(git log -1 --pretty=%s)
            TAG=$(printf '%s\n' "$MSG" | sed -nE 's/^RELEASE:[[:space:]]*([^[:space:]]+).*/\1/p')
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::Could not extract tag from commit message or input."
            exit 1
          fi
          [[ "$TAG" =~ ^v ]] || TAG="v$TAG"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG (version: $VERSION)"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Update issue template version dropdowns
        run: node scripts/update-issue-template-versions.mjs "${{ steps.tag.outputs.tag }}"

      - name: Bump apps/desktop package.json
        run: npm pkg set version="${{ steps.tag.outputs.version }}" --workspace @adt/desktop

      - name: Commit release metadata and push tag
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/*.yml apps/desktop/package.json
          if git diff --staged --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "chore(release): ${{ steps.tag.outputs.tag }}"
            git push origin HEAD:main
          fi
          git tag -f "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}" --force
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop
        run: pnpm --filter @adt/desktop build

      - name: Publish MacOS
        if: matrix.os == 'macos-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          # CSC_LINK — the base64-encoded .p12 content
          # CSC_KEY_PASSWORD — the certificate password
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish Windows
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --win --publish always
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Linux
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @adt/desktop exec electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/unicef/adt-studio:latest
            ghcr.io/unicef/adt-studio:${{ needs.prepare.outputs.tag }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$TAG" --repo ${{ github.repository }} --title "ADT Studio $TAG" --notes ""

      - name: Generate standalone docker-compose.yml
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          sed "s/__TAG__/${TAG}/g" docker/compose-release.yml.template > docker-compose.yml

      - name: Upload docker-compose.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.prepare.outputs.tag }} docker-compose.yml \
            --repo ${{ github.repository }} \
            --clobber

      - name: Upload launcher scripts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.prepare.outputs.tag }} scripts/windows-setup-and-run.bat \
            --repo ${{ github.repository }} \
            --clobber

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq '.body')
          gh release edit "$TAG" --notes "$NOTES"
